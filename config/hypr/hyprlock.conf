source = ~/.config/hypr/hyprlock-theme.conf

general {
    hide_cursor = true
    ignore_empty_input = true
}

background {
    monitor =
    color = $background
}

label {
    monitor =
    text = $TIME
    font_family = $fontDisplay
    font_size = 96
    color = $textDisplay
    position = 0, 140
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] date +"%A %d %B" | tr '[:lower:]' '[:upper:]'
    font_family = $fontMono
    font_size = 12
    letter_spacing = 2
    color = $textSecondary
    position = 0, 70
    halign = center
    valign = center
}

shape {
    monitor =
    size = 320, 1
    color = $borderVisible
    position = 0, 30
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 320, 44
    outline_thickness = 1
    dots_size = 0.25
    dots_spacing = 0.4
    dots_center = true
    outer_color = $border
    inner_color = $surface
    font_color = $textPrimary
    font_family = $fontMono
    placeholder_text = ENTER PASSWORD
    check_color = $accent
    fail_color = $accent
    fail_text = ACCESS DENIED
    rounding = 0
    position = 0, -60
    halign = center
    valign = center
}

label {
    monitor =
    text = $USER
    text_transform = uppercase
    font_family = $fontMono
    font_size = 11
    letter_spacing = 2
    color = $textSecondary
    position = 0, -130
    halign = center
    valign = center
}
