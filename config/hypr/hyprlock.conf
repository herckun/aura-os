source = ~/.config/hypr/hyprlock-theme.conf

general {
    hide_cursor = true
    ignore_empty_input = true
}

background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 8
    brightness = 0.35
    contrast = 0.95
    vibrancy = 0.15
    noise = 0.01
}

label {
    monitor =
    text = $TIME
    font_family = $fontDisplay
    font_size = 128
    color = $textDisplay
    position = 0, 170
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] date +"%A %d %B" | tr '[:lower:]' '[:upper:]'
    font_family = $fontMono
    font_size = 13
    letter_spacing = 3
    color = $textSecondary
    position = 0, 92
    halign = center
    valign = center
}

shape {
    monitor =
    size = 90, 3
    color = $accent
    position = 0, 52
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 340, 52
    outline_thickness = 1
    dots_size = 0.22
    dots_spacing = 0.4
    dots_center = true
    outer_color = $borderVisible
    inner_color = $inputBg
    font_color = $textPrimary
    font_family = $fontMono
    placeholder_text = ENTER PASSWORD
    check_color = $accent
    fail_color = $error
    fail_text = ACCESS DENIED
    rounding = 8
    position = 0, -60
    halign = center
    valign = center
}

label {
    monitor =
    text = $USER
    text_transform = uppercase
    font_family = $fontMono
    font_size = 11
    letter_spacing = 3
    color = $textSecondary
    position = 0, -135
    halign = center
    valign = center
}

label {
    monitor =
    text = LOCKED
    font_family = $fontMono
    font_size = 10
    letter_spacing = 6
    color = $textSecondary
    position = 0, 48
    halign = center
    valign = bottom
}
