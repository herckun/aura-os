# ── Nothing-style Animations (subtle ease-out, no bounce) ──────────────
animations {
  enabled = true

  bezier = nothingEase, 0.25, 0.1, 0.25, 1.0
  bezier = nothingFade, 0.4, 0.0, 0.2, 1.0

  animation = global, 1, 8, nothingFade
  animation = windows, 1, 6, nothingEase, slide
  animation = windowsOut, 1, 6, nothingEase, slide
  animation = windowsMove, 1, 6, nothingEase
  animation = border, 1, 8, nothingEase
  animation = fade, 1, 8, nothingFade
  animation = fadeDim, 1, 8, nothingFade
  animation = workspaces, 1, 6, nothingEase, slidevert
  animation = specialWorkspace, 1, 6, nothingEase, slidevert
  animation = layers, 1, 6, nothingEase, slide
}
