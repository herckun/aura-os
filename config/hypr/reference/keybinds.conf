# ── Keybindings ───────────────────────────────────────────────────
# Super = Cmd key (caps:super set in hyprland.conf)

# ── App Launchers ─────────────────────────────────────────────────────
bind = Super, Return, exec, kitty
bind = Super, Space, exec, fuzzel
bind = Super, E, exec, nautilus
bind = Super, B, exec, firefox
bind = Super, T, exec, qs ipc call launcher toggle
bind = Super, Tab, global, quickshell:overviewToggle

# ── Window Management ─────────────────────────────────────────────────
bind = Super, W, killactive,
bind = Super, M, fullscreen,
bind = Super, P, pseudo,
bind = Super, F, togglefloating,
bind = Super, H, movefocus, l
bind = Super, J, movefocus, d
bind = Super, K, movefocus, u
bind = Super, L, movefocus, r

# ── Move windows (Super + Shift) ──────────────────────────────────────
bind = Super SHIFT, H, movewindow, l
bind = Super SHIFT, J, movewindow, d
bind = Super SHIFT, K, movewindow, u
bind = Super SHIFT, L, movewindow, r

# ── Resize windows (Super + Ctrl) ─────────────────────────────────────
bind = Super CTRL, H, resizeactive, -30 0
bind = Super CTRL, J, resizeactive, 0 30
bind = Super CTRL, K, resizeactive, 0 -30
bind = Super CTRL, L, resizeactive, 30 0

# ── Workspace Navigation ──────────────────────────────────────────────
bind = Super, 1, workspace, 1
bind = Super, 2, workspace, 2
bind = Super, 3, workspace, 3
bind = Super, 4, workspace, 4
bind = Super, 5, workspace, 5
bind = Super, 6, workspace, 6
bind = Super, 7, workspace, 7
bind = Super, 8, workspace, 8
bind = Super, 9, workspace, 9
bind = Super, 0, workspace, 10

# ── Move to Workspace (Super + Alt) ───────────────────────────────────
bind = Super ALT, 1, movetoworkspace, 1
bind = Super ALT, 2, movetoworkspace, 2
bind = Super ALT, 3, movetoworkspace, 3
bind = Super ALT, 4, movetoworkspace, 4
bind = Super ALT, 5, movetoworkspace, 5
bind = Super ALT, 6, movetoworkspace, 6
bind = Super ALT, 7, movetoworkspace, 7
bind = Super ALT, 8, movetoworkspace, 8
bind = Super ALT, 9, movetoworkspace, 9
bind = Super ALT, 0, movetoworkspace, 10

# ── Special Workspace (Mission Control) ───────────────────────────────
bind = Super, S, togglespecialworkspace,
bind = Super SHIFT, S, movetoworkspace, special
bind = Super, Up, workspace, +1
bind = Super, Down, workspace, -1

# ── Scrolling ─────────────────────────────────────────────────────────
bind = Super, mouse_up, workspace, e+1
bind = Super, mouse_down, workspace, e-1



# ── Screenshots ───────────────────────────────────────────────────────
bind = Super SHIFT, 4, exec, grimblast copy area
bind = Super SHIFT, 3, exec, grimblast copy screen
bind = Super SHIFT, 5, exec, grimblast copy output

# ── System ────────────────────────────────────────────────────────────
bind = Super CTRL, Q, exec, hyprctl dispatch exit
bind = Super, R, exec, hyprctl reload

# ── Mouse Bindings ────────────────────────────────────────────────────
bindm = Super, mouse:272, movewindow
bindm = Super, mouse:273, resizewindow
