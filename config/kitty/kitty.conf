# ── Terminal ────────────────────────────────────────────────────────
# Monochrome. Mechanical. OLED black.

# ── Shell ───────────────────────────────────────────────────────────
shell fish

# ── Font ────────────────────────────────────────────────────────────
font_family      JetBrainsMono Nerd Font
bold_font        JetBrainsMono Nerd Font Bold
italic_font      JetBrainsMono Nerd Font
bold_italic_font JetBrainsMono Nerd Font Bold
font_size        11.0

# ── Cursor ──────────────────────────────────────────────────────────
cursor_shape block
cursor_blink_interval 0.5
cursor_stop_blinking_after 15.0

# ── Window ──────────────────────────────────────────────────────────
remember_window_size  yes
initial_window_width  96c
initial_window_height 28c
window_padding_width  8 12 8 12
hide_window_decorations yes
confirm_os_window_close 0
background_opacity    1.0
allow_remote_control   yes

# ── Scrollback ──────────────────────────────────────────────────────
scrollback_lines 10000

# ── Mouse ───────────────────────────────────────────────────────────
copy_on_select          clipboard
mouse_hide_wait         3.0
url_style               curly
open_url_with           default
detect_urls             yes

# ── Bell ────────────────────────────────────────────────────────────
enable_audio_bell no
visual_bell_duration 0.0

# ── Shell integration ──────────────────────────────────────────────
shell_integration no-cursor

# ── Tab Bar ─────────────────────────────────────────────────────────
tab_bar_edge            top
tab_bar_style           separator
tab_bar_align           left
tab_bar_min_tabs        2
tab_bar_margin_width    0.0
tab_bar_margin_height   0.5
tab_bar_margin_color    #000000
tab_bar_background      #000000

active_tab_foreground           #000000
active_tab_background           #e8e8e8
active_tab_font_style           bold

inactive_tab_foreground         #666666
inactive_tab_background         #000000
inactive_tab_font_style         normal

tab_activity_symbol             "●"
inactive_tab_title_template     "{fmt.fg._666666}{index}{fmt.fg.tab} {title[:30]}{title[30:] and '…'}"
tab_title_template              "{bell_symbol}{activity_symbol}{title[:30]}{title[30:] and '…'} [{index}]"
active_tab_title_template       "{bell_symbol}{activity_symbol}{title[:30]}{title[30:] and '…'} [{index}]"

# ── Key mappings ────────────────────────────────────────────────────
map ctrl+shift+t new_tab_with_cwd
map ctrl+shift+w close_tab
map ctrl+shift+right next_tab
map ctrl+shift+left  previous_tab
map ctrl+equal       change_font_size all +1.0
map ctrl+minus       change_font_size all -1.0
map ctrl+0           change_font_size all 0
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard
map ctrl+shift+a select_all

# ── Colors — generated from accent ──────────────────────────────────
include current-theme.conf
