; AuraOS SDDM Theme
; Dark monochrome industrial greeter

[General]
scale = 1.0
enable-animations = true
animated-background-placeholder = ""
background-fill-mode = "fill"
theme-json-path = "@HOME@/.config/@APP_NAME@/sddm-theme.json"

[LoginScreen]
background = "current.jpg"
use-background-color = false
background-color = "#000000"
blur = 12
brightness = -0.08
saturation = -0.15
blur-typing = 28
brightness-typing = -0.15
saturation-typing = -0.4

[LoginScreen.LoginArea]
position = "center"
margin = -1

[LoginScreen.LoginArea.Avatar]
shape = "circle"
active-size = 80
inactive-size = 56
inactive-opacity = 0.35
active-border-size = 0
inactive-border-size = 0
inactive-border-color = "#222222"

[LoginScreen.LoginArea.Username]
font-family = "Space Grotesk"
font-size = 16
font-weight = 600
color = "#E8E8E8"
margin = 12

[LoginScreen.LoginArea.PasswordInput]
width = 240
display-icon = true
font-family = "Space Mono"
font-size = 13
icon = "password.svg"
icon-size = 14
content-color = "#E8E8E8"
background-color = "#111111"
background-opacity = 0.6
border-size = 1
border-color = "#222222"
margin-top = 12
border-radius-left = 12
border-radius-right = 12
masked-character = "\u25CF"

[LoginScreen.LoginArea.LoginButton]
background-opacity = 1.0
active-background-opacity = 0.8
icon = "arrow-right.svg"
icon-size = 16
content-color = "#FFFFFF"
active-content-color = "#FFFFFF"
border-size = 0
margin-left = 6
show-text-if-no-password = true
hide-if-not-needed = false
font-family = "Space Mono"
font-size = 12
font-weight = 600
border-radius-left = 12
border-radius-right = 12

[LoginScreen.LoginArea.Spinner]
display-text = true
text = "Logging in"
font-family = "Space Mono"
font-weight = 400
font-size = 12
icon-size = 24
icon = "spinner.svg"
spacing = 6

[LoginScreen.LoginArea.WarningMessage]
font-family = "Space Mono"
font-size = 11
font-weight = 400
normal-color = "#999999"
margin-top = 12

[LoginScreen.MenuArea.Buttons]
margin-top = 40
margin-right = 40
margin-bottom = 40
margin-left = 40
spacing = 6
font-family = "Space Mono"

[LoginScreen.MenuArea.Popups]
max-height = 300
item-height = 32
item-spacing = 2
padding = 5
display-scrollbar = true
margin = 5
background-color = "#111111"
background-opacity = 0.9
active-option-background-opacity = 0.20
content-color = "#999999"
active-content-color = "#FFFFFF"
font-family = "Space Mono"
border-size = 1
border-color = "#222222"
font-size = 11
icon-size = 14

[LoginScreen.MenuArea.Session]
display = true
position = "bottom-left"
index = 0
popup-direction = "up"
popup-align = "center"
display-session-name = true
button-width = 200
popup-width = 200
background-color = "#111111"
background-opacity = 0.0
active-background-opacity = 0.20
content-color = "#999999"
active-content-color = "#FFFFFF"
border-size = 0
font-size = 10
icon-size = 14

[LoginScreen.MenuArea.Layout]
display = true
position = "bottom-right"
index = 0
popup-direction = "up"
popup-align = "center"
popup-width = 180
display-layout-name = true
background-color = "#111111"
background-opacity = 0.0
active-background-opacity = 0.20
content-color = "#999999"
active-content-color = "#FFFFFF"
border-size = 0
font-size = 10
icon = "language.svg"
icon-size = 14

[LoginScreen.MenuArea.Power]
display = true
position = "bottom-right"
index = 0
popup-direction = "up"
popup-align = "center"
popup-width = 100
background-color = "#111111"
background-opacity = 0.0
active-background-opacity = 0.20
content-color = "#999999"
active-content-color = "#FFFFFF"
border-size = 0
icon = "power.svg"
icon-size = 14

[Tooltips]
enable = true
font-family = "Space Mono"
font-size = 10
content-color = "#E8E8E8"
background-color = "#111111"
background-opacity = 0.9
disable-user = false
disable-login-button = false
